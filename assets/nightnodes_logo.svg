<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="NightNodes animated logo">
  <defs>
    <radialGradient id="nna-plate" cx="30%" cy="20%" r="95%">
      <stop offset="0%"   stop-color="#0c1a14"/>
      <stop offset="55%"  stop-color="#060c0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="nna-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a7f3d0"/>
      <stop offset="40%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="nna-edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="nna-sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#10b981" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>

    <pattern id="nna-grid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0H0V16" fill="none" stroke="rgba(52,211,153,0.06)" stroke-width="1"/>
    </pattern>

    <radialGradient id="nna-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#10b981" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>

    <filter id="nna-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nna-glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <!-- Diagonal path of the N's slash, used by motion path -->
    <path id="nna-diag" d="M 113 62 L 177 194"/>

    <!-- Vertical stroke paths for travelers -->
    <path id="nna-leftcol" d="M 79 198 L 79 58"/>
    <path id="nna-rightcol" d="M 177 58 L 177 198"/>

    <!-- Sweeping scanline mask -->
    <linearGradient id="nna-scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#a7f3d0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Plate -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#nna-plate)"/>
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#nna-grid)"/>
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#nna-sheen)"/>

  <rect x="0.5" y="0.5" width="255" height="255" rx="55.5" ry="55.5"
        fill="none" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>

  <!-- ── Twinkling background stars ─────────────────────── -->
  <g fill="#a7f3d0">
    <circle cx="36"  cy="48"  r="1">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="60"  r="1.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="42"  cy="200" r="1">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="216" cy="218" r="1.3">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="128" cy="32"  r="0.9">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32"  cy="128" r="0.9">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="224" cy="128" r="0.9">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── Sweeping diagonal scan beams ───────────────────── -->
  <g opacity="0.5">
    <line x1="0" y1="220" x2="256" y2="40"
          stroke="url(#nna-scan)" stroke-width="1.2">
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="280" x2="256" y2="100"
          stroke="url(#nna-scan)" stroke-width="0.8">
      <animate attributeName="opacity" values="0;0.45;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ── Outer rotating orbital ring (dashed) ───────────── -->
  <g transform="translate(128 128)">
    <circle r="105" fill="none" stroke="#34d399" stroke-width="0.7"
            opacity="0.35" stroke-dasharray="3 8">
      <animateTransform attributeName="transform" type="rotate"
                        from="0" to="360" dur="40s" repeatCount="indefinite"/>
    </circle>
    <!-- Tiny orbiter on the outer ring -->
    <circle cx="105" cy="0" r="2" fill="#a7f3d0" filter="url(#nna-glow-soft)">
      <animateTransform attributeName="transform" type="rotate"
                        from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── Inner rotating orbital ring (counter direction) ── -->
  <g transform="translate(128 128)">
    <circle r="86" fill="none" stroke="#7dd3fc" stroke-width="0.5"
            opacity="0.2" stroke-dasharray="2 6">
      <animateTransform attributeName="transform" type="rotate"
                        from="360" to="0" dur="30s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-86" cy="0" r="1.6" fill="#7dd3fc" filter="url(#nna-glow-soft)">
      <animateTransform attributeName="transform" type="rotate"
                        from="0" to="-360" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Pulsing halo behind N -->
  <circle cx="128" cy="128" r="92" fill="url(#nna-halo)">
    <animate attributeName="r" values="86;104;86" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ── The N ─────────────────────────────────────────── -->
  <g filter="url(#nna-glow)">
    <rect x="62"  y="58" width="34" height="140" rx="5" fill="url(#nna-grad)"/>
    <rect x="160" y="58" width="34" height="140" rx="5" fill="url(#nna-grad)"/>
    <path d="M 96 58 L 130 58 L 194 198 L 160 198 Z" fill="url(#nna-grad)"/>

    <!-- Bright sweeping highlight strip on diagonal -->
    <path d="M 96 58 L 108 58 L 172 198 L 160 198 Z" fill="url(#nna-edge)" opacity="0.7">
      <animate attributeName="opacity" values="0.35;0.95;0.35" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ── Data particles flowing along the diagonal ──────── -->
  <g>
    <circle r="2.5" fill="#a7f3d0" filter="url(#nna-glow-soft)">
      <animateMotion dur="2.4s" repeatCount="indefinite">
        <mpath href="#nna-diag"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#a7f3d0" filter="url(#nna-glow-soft)">
      <animateMotion dur="2.4s" begin="0.8s" repeatCount="indefinite">
        <mpath href="#nna-diag"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.6" fill="#7dd3fc" filter="url(#nna-glow-soft)">
      <animateMotion dur="2.4s" begin="1.6s" repeatCount="indefinite">
        <mpath href="#nna-diag"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── Data particles flowing up the left pillar ─────── -->
  <g>
    <circle r="1.6" fill="#a7f3d0" opacity="0">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#nna-leftcol"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.6" fill="#a7f3d0" opacity="0">
      <animateMotion dur="3s" begin="1.5s" repeatCount="indefinite">
        <mpath href="#nna-leftcol"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── Data particles flowing down the right pillar ─── -->
  <g>
    <circle r="1.6" fill="#a7f3d0" opacity="0">
      <animateMotion dur="3s" begin="0.7s" repeatCount="indefinite">
        <mpath href="#nna-rightcol"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.6" fill="#a7f3d0" opacity="0">
      <animateMotion dur="3s" begin="2.2s" repeatCount="indefinite">
        <mpath href="#nna-rightcol"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Pulsing endpoint nodes on the diagonal -->
  <circle cx="113" cy="62" r="3" fill="#a7f3d0" filter="url(#nna-glow-soft)">
    <animate attributeName="r" values="2.5;5;2.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="177" cy="194" r="3" fill="#a7f3d0" filter="url(#nna-glow-soft)">
    <animate attributeName="r" values="2.5;5;2.5" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer corner pulse rings -->
  <circle cx="40" cy="40" r="3" fill="none" stroke="#34d399" stroke-width="1" opacity="0.6">
    <animate attributeName="r" values="2;7;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="216" cy="216" r="3" fill="none" stroke="#34d399" stroke-width="1" opacity="0.6">
    <animate attributeName="r" values="2;7;2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
